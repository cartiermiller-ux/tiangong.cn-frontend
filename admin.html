<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 - 阿凡达在海上</title>
<style>
:root{--bg:#0a1628;--bg2:#0d2137;--bg3:#112a42;--accent:#00d4ff;--accent2:#7b68ee;--gold:#ffd700;--text:#e0e6ed;--dim:#8899aa;--border:rgba(0,212,255,.2);--card:rgba(13,33,55,.85);--danger:#ff4757;--success:#2ed573}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent);text-decoration:none}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;width:380px}
.login-box h2{text-align:center;margin-bottom:24px;color:var(--accent)}
.login-box input{width:100%;padding:12px 16px;margin-bottom:12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none}
.login-box input:focus{border-color:var(--accent)}
.login-box button{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.login-box button:hover{opacity:.9}

/* Layout */
.app{display:none;min-height:100vh}
.app.active{display:flex}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);padding:20px 0;flex-shrink:0;position:fixed;height:100vh;overflow-y:auto}
.sidebar .logo{padding:0 20px 20px;border-bottom:1px solid var(--border);margin-bottom:12px}
.sidebar .logo h3{color:var(--accent);font-size:16px}
.sidebar .logo small{color:var(--dim);font-size:12px}
.sidebar nav a{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--dim);font-size:14px;transition:all .2s}
.sidebar nav a:hover,.sidebar nav a.active{color:var(--accent);background:rgba(0,212,255,.06);border-right:3px solid var(--accent)}
.sidebar .logout{position:absolute;bottom:20px;left:20px;right:20px;padding:8px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--dim);cursor:pointer;font-size:13px;text-align:center}
.sidebar .logout:hover{color:var(--danger);border-color:var(--danger)}
.main{margin-left:220px;flex:1;padding:24px 32px;min-height:100vh}
.main h2{font-size:22px;margin-bottom:20px;display:flex;align-items:center;gap:8px}

/* Stats cards */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px}
.stat-card .label{color:var(--dim);font-size:13px;margin-bottom:6px}
.stat-card .val{font-size:28px;font-weight:700;color:var(--accent)}
.stat-card .val.gold{color:var(--gold)}
.stat-card .val.green{color:var(--success)}

/* Table */
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px}
.table-wrap .toolbar{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border)}
.table-wrap .toolbar h3{font-size:15px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 16px;text-align:left;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04)}
th{color:var(--dim);font-weight:500;background:rgba(0,0,0,.15)}
td{color:var(--text)}
tr:hover td{background:rgba(0,212,255,.03)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge-paid{background:rgba(46,213,115,.15);color:var(--success)}
.badge-pending{background:rgba(255,193,7,.15);color:var(--gold)}
.badge-delivered{background:rgba(0,212,255,.15);color:var(--accent)}
.badge-active{background:rgba(46,213,115,.15);color:var(--success)}
.badge-banned{background:rgba(255,71,87,.15);color:var(--danger)}

/* Buttons */
.btn{padding:7px 16px;border-radius:8px;border:none;font-size:13px;cursor:pointer;font-weight:500;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--accent)}
.btn-danger{background:transparent;border:1px solid var(--danger);color:var(--danger)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn:hover{opacity:.85}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
.modal-bg.active{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:28px;width:480px;max-height:80vh;overflow-y:auto}
.modal h3{margin-bottom:16px;color:var(--accent)}
.modal label{display:block;color:var(--dim);font-size:13px;margin:10px 0 4px}
.modal input,.modal select,.modal textarea{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none}
.modal input:focus,.modal textarea:focus{border-color:var(--accent)}
.modal textarea{min-height:80px;resize:vertical}
.modal .actions{display:flex;gap:10px;margin-top:18px;justify-content:flex-end}

/* Toast */
.toast-c{position:fixed;top:20px;right:20px;z-index:200}
.toast{padding:12px 20px;border-radius:10px;margin-bottom:8px;font-size:14px;animation:slideIn .3s}
.toast-success{background:rgba(46,213,115,.15);border:1px solid var(--success);color:var(--success)}
.toast-error{background:rgba(255,71,87,.15);border:1px solid var(--danger);color:var(--danger)}
.toast-info{background:rgba(0,212,255,.1);border:1px solid var(--accent);color:var(--accent)}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}

/* Responsive */
@media(max-width:768px){.sidebar{width:60px}.sidebar .logo h3,.sidebar .logo small,.sidebar nav a span{display:none}.sidebar nav a{justify-content:center;padding:12px}.main{margin-left:60px;padding:16px}}
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <h2>管理后台登录</h2>
    <input type="text" id="loginAccount" placeholder="用户名 / 邮箱">
    <input type="password" id="loginPass" placeholder="密码">
    <button onclick="doLogin()">登 录</button>
  </div>
</div>

<!-- App -->
<div class="app" id="app">
  <aside class="sidebar">
    <div class="logo"><h3>阿凡达在海上</h3><small>管理后台</small></div>
    <nav>
      <a href="#" class="active" onclick="switchTab('dashboard',this)"><span>📊 仪表盘</span></a>
      <a href="#" onclick="switchTab('products',this)"><span>📦 商品管理</span></a>
      <a href="#" onclick="switchTab('orders',this)"><span>📋 订单管理</span></a>
      <a href="#" onclick="switchTab('users',this)"><span>👥 用户管理</span></a>
      <a href="#" onclick="switchTab('cards',this)"><span>🔑 卡密管理</span></a>
    </nav>
    <button class="logout" onclick="doLogout()">退出登录</button>
  </aside>

  <main class="main">
    <!-- Dashboard -->
    <div id="tab-dashboard">
      <h2>📊 仪表盘</h2>
      <div class="stats" id="dashStats"></div>
      <div class="table-wrap">
        <div class="toolbar"><h3>最近订单</h3></div>
        <table><thead><tr><th>订单号</th><th>商品</th><th>金额</th><th>状态</th><th>时间</th></tr></thead><tbody id="dashOrders"></tbody></table>
      </div>
    </div>

    <!-- Products -->
    <div id="tab-products" style="display:none">
      <h2>📦 商品管理</h2>
      <div class="table-wrap">
        <div class="toolbar"><h3>商品列表</h3><button class="btn btn-primary" onclick="openProductModal()">+ 新增商品</button></div>
        <table><thead><tr><th>ID</th><th>名称</th><th>分类</th><th>价格</th><th>库存</th><th>状态</th><th>操作</th></tr></thead><tbody id="productList"></tbody></table>
      </div>
    </div>

    <!-- Orders -->
    <div id="tab-orders" style="display:none">
      <h2>📋 订单管理</h2>
      <div class="table-wrap">
        <div class="toolbar"><h3>全部订单</h3></div>
        <table><thead><tr><th>订单号</th><th>商品</th><th>用户</th><th>邮箱</th><th>金额</th><th>支付</th><th>状态</th><th>时间</th></tr></thead><tbody id="orderList"></tbody></table>
      </div>
    </div>

    <!-- Users -->
    <div id="tab-users" style="display:none">
      <h2>👥 用户管理</h2>
      <div class="table-wrap">
        <div class="toolbar"><h3>用户列表</h3></div>
        <table><thead><tr><th>ID</th><th>用户名</th><th>邮箱</th><th>角色</th><th>余额</th><th>状态</th><th>操作</th></tr></thead><tbody id="userList"></tbody></table>
      </div>
    </div>

    <!-- Cards -->
    <div id="tab-cards" style="display:none">
      <h2>🔑 卡密管理</h2>
      <div class="table-wrap">
        <div class="toolbar"><h3>卡密列表</h3>
          <div style="display:flex;gap:8px">
            <select id="cardFilter" onchange="loadCards()" style="padding:6px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px"><option value="">全部商品</option></select>
            <button class="btn btn-primary" onclick="openCardImportModal()">批量导入</button>
          </div>
        </div>
        <table><thead><tr><th>ID</th><th>卡密内容</th><th>所属商品</th><th>状态</th><th>创建时间</th></tr></thead><tbody id="cardList"></tbody></table>
      </div>
    </div>
  </main>
</div>

<!-- Product Modal -->
<div class="modal-bg" id="productModal">
  <div class="modal">
    <h3 id="productModalTitle">新增商品</h3>
    <input type="hidden" id="editProductId">
    <label>商品名称</label><input id="pName" placeholder="如: Netflix 高级会员">
    <label>分类</label>
    <select id="pCategory" style="padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);width:100%">
      <option value="account">账号类</option><option value="key">卡密类</option><option value="vip">会员类</option><option value="software">软件类</option>
    </select>
    <label>描述</label><textarea id="pDesc" placeholder="商品描述"></textarea>
    <label>价格 (元)</label><input id="pPrice" type="number" step="0.1" placeholder="29.9">
    <label>原价 (元)</label><input id="pOriginal" type="number" step="0.1" placeholder="59.9">
    <label>标签</label>
    <select id="pBadge" style="padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);width:100%">
      <option value="hot">热卖</option><option value="new">新品</option><option value="vip">VIP</option>
    </select>
    <label>图片URL</label><input id="pImg" placeholder="https://...">
    <div class="actions">
      <button class="btn btn-outline" onclick="closeModal('productModal')">取消</button>
      <button class="btn btn-primary" onclick="saveProduct()">保存</button>
    </div>
  </div>
</div>

<!-- Card Import Modal -->
<div class="modal-bg" id="cardImportModal">
  <div class="modal">
    <h3>批量导入卡密</h3>
    <label>选择商品</label>
    <select id="importProductId" style="padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);width:100%"></select>
    <label>卡密列表 (每行一个)</label>
    <textarea id="importCards" placeholder="CARD-KEY-001&#10;CARD-KEY-002&#10;CARD-KEY-003" style="min-height:150px"></textarea>
    <div class="actions">
      <button class="btn btn-outline" onclick="closeModal('cardImportModal')">取消</button>
      <button class="btn btn-primary" onclick="importCards()">导入</button>
    </div>
  </div>
</div>

<div class="toast-c" id="toastC"></div>

<script>
const API = '/api';
let token = localStorage.getItem('admin_token');
let products = [];

// === API Helper ===
async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: 'Bearer ' + token } : {}), ...opts.headers },
    ...opts
  });
  const data = await res.json();
  if (data.code !== 0) throw new Error(data.message || '请求失败');
  return data.data;
}

// === Auth ===
async function doLogin() {
  const account = document.getElementById('loginAccount').value.trim();
  const password = document.getElementById('loginPass').value;
  if (!account || !password) return toast('请填写完整', 'error');
  try {
    const d = await api('/auth/login', { method: 'POST', body: JSON.stringify({ account, password }) });
    if (d.user.role !== 'admin') return toast('该账号不是管理员', 'error');
    token = d.token;
    localStorage.setItem('admin_token', token);
    showApp();
  } catch (e) { toast(e.message, 'error'); }
}

function doLogout() {
  token = null;
  localStorage.removeItem('admin_token');
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('app').classList.remove('active');
}

async function showApp() {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('app').classList.add('active');
  await loadAll();
}

async function loadAll() {
  try {
    products = await api('/products');
  } catch (_) {}
  loadDashboard();
  loadProducts();
  loadOrders();
  loadUsers();
  loadCards();
}

// === Dashboard ===
async function loadDashboard() {
  try {
    const d = await api('/admin/dashboard');
    document.getElementById('dashStats').innerHTML = `
      <div class="stat-card"><div class="label">注册用户</div><div class="val">${d.users}</div></div>
      <div class="stat-card"><div class="label">在售商品</div><div class="val">${d.products}</div></div>
      <div class="stat-card"><div class="label">总订单</div><div class="val">${d.orders}</div></div>
      <div class="stat-card"><div class="label">已支付</div><div class="val green">${d.paidOrders}</div></div>
      <div class="stat-card"><div class="label">总收入</div><div class="val gold">¥${Number(d.revenue).toFixed(1)}</div></div>
      <div class="stat-card"><div class="label">未售卡密</div><div class="val">${d.pendingCards}</div></div>
      <div class="stat-card"><div class="label">已售卡密</div><div class="val green">${d.soldCards}</div></div>
    `;
    const orders = await api('/admin/orders');
    document.getElementById('dashOrders').innerHTML = orders.list.slice(0, 5).map(o => `
      <tr><td>${o.order_no}</td><td>${o.product_name || '-'}</td><td>¥${o.total_amount}</td>
      <td><span class="badge badge-${o.payment_status}">${o.payment_status === 'paid' ? '已支付' : '待支付'}</span></td>
      <td>${o.created_at}</td></tr>
    `).join('');
  } catch (e) { toast('加载仪表盘失败: ' + e.message, 'error'); }
}

// === Products ===
function loadProducts() {
  const tbody = document.getElementById('productList');
  if (!products.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--dim)">暂无商品</td></tr>'; return; }
  tbody.innerHTML = products.map(p => `
    <tr><td>${p.id}</td><td>${p.name}</td><td>${catName(p.category)}</td>
    <td>¥${p.price} <s style="color:var(--dim);font-size:11px">¥${p.originalPrice || p.original_price || '-'}</s></td>
    <td>${p.stock}</td>
    <td><span class="badge badge-active">在售</span></td>
    <td>
      <button class="btn btn-outline btn-sm" onclick="editProduct(${p.id})">编辑</button>
      <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">下架</button>
    </td></tr>
  `).join('');
  // Update card filter
  const sel = document.getElementById('cardFilter');
  sel.innerHTML = '<option value="">全部商品</option>' + products.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
  const sel2 = document.getElementById('importProductId');
  sel2.innerHTML = products.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
}

function catName(c) { return { account: '账号类', key: '卡密类', vip: '会员类', software: '软件类' }[c] || c; }

function openProductModal(id) {
  document.getElementById('productModalTitle').textContent = id ? '编辑商品' : '新增商品';
  document.getElementById('editProductId').value = id || '';
  if (!id) { ['pName','pDesc','pPrice','pOriginal','pImg'].forEach(i => document.getElementById(i).value = ''); }
  document.getElementById('productModal').classList.add('active');
}

function editProduct(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  document.getElementById('editProductId').value = id;
  document.getElementById('pName').value = p.name;
  document.getElementById('pCategory').value = p.category;
  document.getElementById('pDesc').value = p.desc || p.description || '';
  document.getElementById('pPrice').value = p.price;
  document.getElementById('pOriginal').value = p.originalPrice || p.original_price || '';
  document.getElementById('pBadge').value = p.badge || 'hot';
  document.getElementById('pImg').value = p.img || p.image || '';
  document.getElementById('productModalTitle').textContent = '编辑商品';
  document.getElementById('productModal').classList.add('active');
}

async function saveProduct() {
  const id = document.getElementById('editProductId').value;
  const body = {
    name: document.getElementById('pName').value,
    category: document.getElementById('pCategory').value,
    desc: document.getElementById('pDesc').value,
    price: parseFloat(document.getElementById('pPrice').value),
    originalPrice: parseFloat(document.getElementById('pOriginal').value) || null,
    badge: document.getElementById('pBadge').value,
    img: document.getElementById('pImg').value || null
  };
  try {
    if (id) {
      await api('/products/' + id, { method: 'PUT', body: JSON.stringify(body) });
      toast('商品更新成功', 'success');
    } else {
      await api('/products', { method: 'POST', body: JSON.stringify(body) });
      toast('商品创建成功', 'success');
    }
    closeModal('productModal');
    products = await api('/products');
    loadProducts();
    loadDashboard();
  } catch (e) { toast(e.message, 'error'); }
}

async function deleteProduct(id) {
  if (!confirm('确定要下架此商品吗？')) return;
  try {
    await api('/products/' + id, { method: 'DELETE' });
    toast('商品已下架', 'success');
    products = await api('/products');
    loadProducts();
  } catch (e) { toast(e.message, 'error'); }
}

// === Orders ===
async function loadOrders() {
  try {
    const d = await api('/admin/orders');
    document.getElementById('orderList').innerHTML = d.list.map(o => `
      <tr><td style="font-family:monospace;font-size:12px">${o.order_no}</td>
      <td>${o.product_name || '-'}</td><td>${o.username || '游客'}</td>
      <td>${o.email}</td><td>¥${o.total_amount}</td>
      <td><span class="badge badge-${o.payment_status}">${o.payment_status === 'paid' ? '已支付' : '待支付'}</span></td>
      <td><span class="badge badge-${o.order_status === 'delivered' ? 'delivered' : 'pending'}">${o.order_status === 'delivered' ? '已发货' : '待处理'}</span></td>
      <td>${o.created_at}</td></tr>
    `).join('');
  } catch (e) { toast('加载订单失败', 'error'); }
}

// === Users ===
async function loadUsers() {
  try {
    const users = await api('/admin/users');
    document.getElementById('userList').innerHTML = users.map(u => `
      <tr><td>${u.id}</td><td>${u.username}</td><td>${u.email}</td>
      <td>${u.role === 'admin' ? '<span style="color:var(--gold)">管理员</span>' : '用户'}</td>
      <td>¥${Number(u.balance || 0).toFixed(2)}</td>
      <td><span class="badge badge-${u.status === 'active' ? 'active' : 'banned'}">${u.status === 'active' ? '正常' : '封禁'}</span></td>
      <td>${u.role !== 'admin' ? `<button class="btn btn-sm ${u.status === 'active' ? 'btn-danger' : 'btn-outline'}" onclick="toggleBan(${u.id}, '${u.status}')">${u.status === 'active' ? '封禁' : '解封'}</button>` : '-'}</td></tr>
    `).join('');
  } catch (e) { toast('加载用户失败', 'error'); }
}

async function toggleBan(id, status) {
  const action = status === 'active' ? '封禁' : '解封';
  if (!confirm(`确定要${action}此用户吗？`)) return;
  try {
    await api('/admin/users/' + id + '/ban', { method: 'PUT', body: JSON.stringify({ ban: status === 'active' }) });
    toast(`${action}成功`, 'success');
    loadUsers();
  } catch (e) { toast(e.message, 'error'); }
}

// === Cards ===
async function loadCards() {
  const pid = document.getElementById('cardFilter').value;
  try {
    let url = '/admin/cards';
    if (pid) url += '?productId=' + pid;
    const cards = await api(url);
    document.getElementById('cardList').innerHTML = (Array.isArray(cards) ? cards : cards.list || []).map(c => `
      <tr><td>${c.id}</td><td style="font-family:monospace;font-size:12px;word-break:break-all">${c.content}</td>
      <td>${c.product_name || '-'}</td>
      <td><span class="badge badge-${c.status === 'unsold' ? 'active' : 'delivered'}">${c.status === 'unsold' ? '未售' : '已售'}</span></td>
      <td>${c.created_at || c.sold_at || '-'}</td></tr>
    `).join('');
  } catch (e) { toast('加载卡密失败', 'error'); }
}

function openCardImportModal() {
  document.getElementById('importCards').value = '';
  document.getElementById('cardImportModal').classList.add('active');
}

async function importCards() {
  const pid = document.getElementById('importProductId').value;
  const text = document.getElementById('importCards').value.trim();
  if (!pid || !text) return toast('请选择商品并填写卡密', 'error');
  const cards = text.split('\n').map(s => s.trim()).filter(Boolean);
  if (!cards.length) return toast('请填写卡密', 'error');
  try {
    const r = await api('/products/' + pid + '/cards', { method: 'POST', body: JSON.stringify({ cards }) });
    toast(`成功导入 ${cards.length} 个卡密`, 'success');
    closeModal('cardImportModal');
    loadCards();
    loadDashboard();
  } catch (e) { toast(e.message, 'error'); }
}

// === Utils ===
function switchTab(name, el) {
  document.querySelectorAll('[id^="tab-"]').forEach(t => t.style.display = 'none');
  document.getElementById('tab-' + name).style.display = '';
  document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.remove('active'));
  if (el) el.classList.add('active');
  if (name === 'dashboard') loadDashboard();
  if (name === 'orders') loadOrders();
  if (name === 'users') loadUsers();
  if (name === 'cards') loadCards();
}

function closeModal(id) { document.getElementById(id).classList.remove('active'); }
document.querySelectorAll('.modal-bg').forEach(m => m.addEventListener('click', e => { if (e.target === m) m.classList.remove('active'); }));

function toast(msg, type = 'info') {
  const t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.innerHTML = msg;
  document.getElementById('toastC').appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

// === Init ===
(async () => {
  if (token) {
    try {
      const me = await api('/auth/me');
      if (me.role === 'admin') { showApp(); return; }
    } catch (_) { localStorage.removeItem('admin_token'); }
  }
})();
</script>
